<!doctype html>
<html lang="zh-CN" data-theme-pref="">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SPMA — 企业级多源 RAG 智能问答</title>
<style>
/* ============================================================
   SPMA Design Tokens — macOS原生 + #007AFF
   精修：8pt grid·type ramp·elevation·focus ring
   ============================================================ */
:root {
  /* ---- Brand ---- */
  --primary: #007AFF;
  --primary-bg: rgba(0,122,255,0.08);
  --primary-hover: rgba(0,122,255,0.14);
  --primary-pressed: rgba(0,122,255,0.22);
  --warning: #FF9500;
  --warning-bg: rgba(255,149,0,0.08);
  --warning-hover: rgba(255,149,0,0.14);
  --success: #34C759;
  --success-bg: rgba(52,199,89,0.08);
  --danger: #FF3B30;
  --danger-bg: rgba(255,59,48,0.08);
  --danger-hover: rgba(255,59,48,0.14);

  /* ---- Surfaces ---- */
  --bg-primary: #FFFFFF;
  --bg-secondary: rgba(0,0,0,0.02);
  --bg-tertiary: rgba(0,0,0,0.04);
  --bg-elevated: #FFFFFF;
  --sidebar-bg: rgba(250,250,250,0.72);
  --sidebar-border: rgba(0,0,0,0.06);
  --overlay-bg: rgba(0,0,0,0.32);

  /* ---- Borders ---- */
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.10);
  --border-focus: #007AFF;

  /* ---- Text ---- */
  --text-primary: #1D1D1F;
  --text-secondary: #86868B;
  --text-tertiary: #AEAEB2;
  --text-inverse: #FFFFFF;

  /* ---- Shadows (elevation tokens) ---- */
  --shadow-none: 0 0 0 0 transparent;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 1px 3px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);

  /* ---- Radii ---- */
  --radius-xs: 4px;
  --radius-sm: 7px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --radius-full: 9999px;

  /* ---- Spacing (8pt grid) ---- */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ---- Typography ---- */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;

  /* ---- Type scale ---- */
  --text-xs: 10px;     --leading-xs: 1.4;
  --text-sm: 11px;     --leading-sm: 1.5;
  --text-base: 13px;   --leading-base: 1.6;
  --text-md: 14px;     --leading-md: 1.5;
  --text-lg: 16px;     --leading-lg: 1.4;
  --text-xl: 20px;     --leading-xl: 1.3;

  /* ---- Motion ---- */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 120ms;
  --duration-normal: 200ms;
  --duration-slow: 300ms;
  --duration-page: 400ms;

  color-scheme: light;
}

/* ---- Manual dark mode ---- */
:root[data-theme-pref="dark"] {
  --primary: #0A84FF;
  --primary-bg: rgba(10,132,255,0.15);
  --primary-hover: rgba(10,132,255,0.22);
  --primary-pressed: rgba(10,132,255,0.30);
  --warning: #FF9F0A;
  --warning-bg: rgba(255,159,10,0.15);
  --warning-hover: rgba(255,159,10,0.22);
  --success: #30D158;
  --success-bg: rgba(48,209,88,0.15);
  --danger: #FF453A;
  --danger-bg: rgba(255,69,58,0.15);
  --danger-hover: rgba(255,69,58,0.22);
  --bg-primary: #1C1C1E;
  --bg-secondary: rgba(255,255,255,0.04);
  --bg-tertiary: rgba(255,255,255,0.06);
  --bg-elevated: #2C2C2E;
  --sidebar-bg: rgba(30,30,32,0.72);
  --sidebar-border: rgba(255,255,255,0.06);
  --overlay-bg: rgba(0,0,0,0.55);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.10);
  --border-focus: #0A84FF;
  --text-primary: #F5F5F7;
  --text-secondary: #98989D;
  --text-tertiary: #6E6E73;
  --text-inverse: #FFFFFF;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 1px 3px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.25);
  color-scheme: dark;
}

/* ---- System dark (when no manual pref) ---- */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme-pref="light"]) {
    --primary: #0A84FF;
    --primary-bg: rgba(10,132,255,0.15);
    --primary-hover: rgba(10,132,255,0.22);
    --primary-pressed: rgba(10,132,255,0.30);
    --warning: #FF9F0A;
    --warning-bg: rgba(255,159,10,0.15);
    --warning-hover: rgba(255,159,10,0.22);
    --success: #30D158;
    --success-bg: rgba(48,209,88,0.15);
    --danger: #FF453A;
    --danger-bg: rgba(255,69,58,0.15);
    --danger-hover: rgba(255,69,58,0.22);
    --bg-primary: #1C1C1E;
    --bg-secondary: rgba(255,255,255,0.04);
    --bg-tertiary: rgba(255,255,255,0.06);
    --bg-elevated: #2C2C2E;
    --sidebar-bg: rgba(30,30,32,0.72);
    --sidebar-border: rgba(255,255,255,0.06);
    --overlay-bg: rgba(0,0,0,0.55);
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --border-focus: #0A84FF;
    --text-primary: #F5F5F7;
    --text-secondary: #98989D;
    --text-tertiary: #6E6E73;
    --text-inverse: #FFFFFF;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.2);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.25);
    color-scheme: dark;
  }
}

/* ---- Reduced motion ---- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font: var(--text-base)/var(--leading-base) var(--font-sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  user-select: none;
}
button {
  font: inherit; cursor: pointer; border: 0; background: none; color: inherit;
  -webkit-tap-highlight-color: transparent;
}
input, textarea {
  font: inherit; color: inherit; border: 0; outline: 0; background: none;
}
input::placeholder, textarea::placeholder { color: var(--text-tertiary); }

/* Focus ring — accessible but subtle */
:focus-visible {
  outline: 2px solid var(--border-focus);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}
button:focus-visible, .session-item:focus-visible, .source-option:focus-visible {
  border-radius: var(--radius-sm);
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ============================================================
   Layout
   ============================================================ */
.app-layout {
  display: flex;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}

/* ---- Left Sidebar (210px) ---- */
.sidebar {
  width: 210px; min-width: 210px;
  display: flex; flex-direction: column;
  background: var(--sidebar-bg);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-right: 0.5px solid var(--sidebar-border);
  z-index: 10;
}
.sidebar-header {
  padding: var(--space-4) var(--space-3);
  display: flex; align-items: center; gap: var(--space-2);
  border-bottom: 0.5px solid var(--border);
  min-height: 48px;
}
.sidebar-logo {
  width: 28px; height: 28px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-sm);
  display: grid; place-items: center;
  font-weight: 700; font-size: 15px; flex-shrink: 0;
}
.sidebar-brand { font-weight: 600; font-size: var(--text-base); flex: 1; }
.sidebar-new-btn {
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  display: grid; place-items: center;
  font-size: 16px; color: var(--text-secondary);
  transition: background var(--duration-fast) var(--ease-out),
              color var(--duration-fast) var(--ease-out);
}
.sidebar-new-btn:hover { background: var(--bg-tertiary); color: var(--primary); }
.sidebar-new-btn:active { transform: scale(0.94); transition: transform 80ms var(--ease-out); }
.session-search { padding: var(--space-2) var(--space-3); }
.session-search input {
  width: 100%; padding: 6px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  font-size: var(--text-sm); line-height: var(--leading-sm);
  border: 0.5px solid transparent;
  transition: border var(--duration-fast) var(--ease-out),
              background var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out);
}
.session-search input:focus-visible {
  background: var(--bg-primary);
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-bg);
  outline: none;
}
.session-list {
  flex: 1; overflow-y: auto;
  padding: var(--space-1) var(--space-2);
}
.session-item {
  display: flex; align-items: center; gap: var(--space-2);
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; position: relative;
  transition: background var(--duration-fast) var(--ease-out);
  animation: listItemEnter 0.35s var(--ease-out) both;
}
.session-item:nth-child(1) { animation-delay: 0.02s; }
.session-item:nth-child(2) { animation-delay: 0.06s; }
.session-item:nth-child(3) { animation-delay: 0.10s; }
.session-item:nth-child(4) { animation-delay: 0.14s; }
.session-item:nth-child(5) { animation-delay: 0.18s; }
@keyframes listItemEnter {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}
.session-item:hover { background: var(--bg-tertiary); }
.session-item.active { background: var(--primary-bg); }
.session-item.active .session-title { color: var(--primary); font-weight: 500; }
.session-item-avatar {
  width: 20px; height: 20px; border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  display: grid; place-items: center;
  font-size: var(--text-xs); flex-shrink: 0;
}
.session-item.active .session-item-avatar { background: var(--primary-bg); }
.session-item-info { flex: 1; min-width: 0; }
.session-title {
  font-size: 12px; font-weight: 400;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text-primary);
}
.session-meta {
  font-size: var(--text-xs); color: var(--text-tertiary);
  display: flex; gap: var(--space-2); margin-top: 1px;
}
.session-delete {
  opacity: 0; width: 20px; height: 20px; border-radius: var(--radius-sm);
  display: grid; place-items: center;
  font-size: 12px; color: var(--danger);
  transition: opacity var(--duration-fast) var(--ease-out),
              background var(--duration-fast) var(--ease-out);
}
.session-item:hover .session-delete { opacity: 1; }
.session-delete:hover { background: var(--danger-bg); }

.system-status {
  padding: var(--space-3);
  border-top: 0.5px solid var(--border);
  font-size: var(--text-xs);
}
.system-status-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px; color: var(--text-secondary);
}
.system-status-row:last-child { margin-bottom: 0; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-dot.green { background: var(--success); }
.status-dot.amber { background: var(--warning); }
.status-dot.red { background: var(--danger); }
.status-label { font-weight: 500; color: var(--text-primary); }

/* ---- Center Chat Panel ---- */
.chat-panel {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; background: var(--bg-primary);
}
.chat-header {
  padding: var(--space-3) var(--space-4);
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: var(--space-3);
  min-height: 48px;
}
.chat-header-title {
  font-weight: 600; font-size: var(--text-md);
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-header-meta {
  font-size: var(--text-sm); color: var(--text-secondary);
  display: flex; align-items: center; gap: var(--space-3);
}
.theme-toggle {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  display: grid; place-items: center; font-size: 15px;
  transition: background var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
}
.theme-toggle:hover { background: var(--bg-tertiary); }
.theme-toggle:active { transform: scale(0.92); }

.message-list {
  flex: 1; overflow-y: auto;
  padding: var(--space-4);
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}
.message-list.empty {
  display: flex; align-items: center; justify-content: center;
}
.empty-state {
  text-align: center; max-width: 420px;
  animation: emptyFadeIn 0.5s var(--ease-out) both;
}
@keyframes emptyFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.empty-logo {
  width: 48px; height: 48px;
  background: var(--primary); color: #fff;
  border-radius: var(--radius-md);
  display: grid; place-items: center;
  font-weight: 700; font-size: 22px;
  margin: 0 auto var(--space-4);
}
.empty-title { font-weight: 600; font-size: var(--text-lg); margin-bottom: var(--space-1); }
.empty-desc { color: var(--text-secondary); font-size: var(--text-base); margin-bottom: var(--space-4); }
.empty-examples { display: flex; flex-direction: column; gap: var(--space-2); }
.empty-example {
  padding: 10px 14px; border-radius: var(--radius-md);
  background: var(--bg-secondary);
  border: 0.5px solid var(--border);
  text-align: left; font-size: var(--text-base);
  color: var(--text-primary); cursor: pointer;
  transition: border var(--duration-fast) var(--ease-out),
              background var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
}
.empty-example:hover {
  border-color: var(--primary);
  background: var(--primary-bg);
  transform: translateY(-1px);
}
.empty-example:active { transform: scale(0.985); }
.empty-example .example-icon { margin-right: 6px; }

/* Messages */
.message {
  margin-bottom: var(--space-4);
  animation: msgEnter 0.35s var(--ease-spring) both;
}
@keyframes msgEnter {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.user-message { display: flex; justify-content: flex-end; }
.user-bubble {
  max-width: 70%;
  background: var(--primary); color: var(--text-inverse);
  padding: 10px 14px;
  border-radius: var(--radius-md) var(--radius-md) 3px var(--radius-md);
  font-size: var(--text-base); line-height: var(--leading-base);
  box-shadow: var(--shadow-sm);
}
.ai-message { display: flex; gap: var(--space-3); }
.ai-avatar {
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  display: grid; place-items: center;
  font-size: var(--text-base); flex-shrink: 0;
}
.ai-card {
  flex: 1; min-width: 0;
  background: var(--bg-secondary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  font-size: var(--text-base); line-height: var(--leading-base);
}
.ai-card h1, .ai-card h2, .ai-card h3 {
  font-size: var(--text-md); font-weight: 600;
  margin: var(--space-3) 0 var(--space-1);
  line-height: var(--leading-md);
}
.ai-card h1:first-child, .ai-card h2:first-child, .ai-card h3:first-child { margin-top: 0; }
.ai-card p { margin-bottom: var(--space-2); }
.ai-card ul, .ai-card ol { margin: var(--space-2) 0; padding-left: var(--space-5); }
.ai-card li { margin-bottom: var(--space-1); }
.ai-card code {
  font-family: var(--font-mono); font-size: 12px;
  background: var(--bg-tertiary); padding: 1px 5px; border-radius: 3px;
}
.ai-card pre {
  background: #1c1c1e; color: #e4e4e7;
  padding: var(--space-3); border-radius: var(--radius-sm);
  overflow-x: auto;
  font-family: var(--font-mono); font-size: 12px; line-height: 1.5;
  margin: var(--space-3) 0;
}
.ai-card pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
.ai-card blockquote {
  border-left: 3px solid var(--primary); padding-left: var(--space-3);
  color: var(--text-secondary); margin: var(--space-2) 0;
}
.ai-card table {
  width: 100%; border-collapse: collapse;
  margin: var(--space-2) 0; font-size: 12px;
}
.ai-card th, .ai-card td {
  text-align: left; padding: 6px 10px;
  border-bottom: 0.5px solid var(--border);
}
.ai-card th { font-weight: 600; color: var(--text-secondary); font-size: var(--text-sm); }

/* Citation */
.citation {
  display: inline-block;
  background: var(--primary-bg); color: var(--primary);
  padding: 1px 6px; border-radius: 3px;
  font-size: var(--text-sm); font-weight: 500; cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out),
              color var(--duration-fast) var(--ease-out);
  margin: 0 2px;
}
.citation:hover { background: var(--primary-hover); }
.citation.highlight { background: var(--primary); color: #fff; }

/* Followup pills */
.followup-pills {
  display: flex; flex-wrap: wrap; gap: var(--space-2);
  margin-top: var(--space-3);
}
.followup-pill {
  padding: 5px 12px; border-radius: var(--radius-full);
  background: var(--bg-tertiary); border: 0.5px solid var(--border);
  font-size: var(--text-sm); color: var(--text-primary); cursor: pointer;
  transition: border var(--duration-fast) var(--ease-out),
              background var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  animation: pillStagger 0.35s var(--ease-out) both;
}
.followup-pill:nth-child(1) { animation-delay: 0.05s; }
.followup-pill:nth-child(2) { animation-delay: 0.12s; }
.followup-pill:nth-child(3) { animation-delay: 0.19s; }
@keyframes pillStagger {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.followup-pill:hover {
  border-color: var(--primary); background: var(--primary-bg);
  transform: translateY(-1px);
}
.followup-pill:active { transform: scale(0.96); }

/* Message actions */
.message-actions {
  display: flex; gap: var(--space-1);
  margin-top: var(--space-2);
  opacity: 0;
  transition: opacity var(--duration-normal) var(--ease-out);
}
.ai-message:hover .message-actions { opacity: 1; }
.msg-action {
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  display: grid; place-items: center;
  font-size: var(--text-base); color: var(--text-secondary);
  transition: background var(--duration-fast) var(--ease-out),
              color var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
}
.msg-action:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.msg-action:active { transform: scale(0.88); }
.msg-action.liked { color: var(--primary); }
.msg-action.bounce {
  animation: likeBounce 0.4s var(--ease-spring);
}
@keyframes likeBounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

/* Degradation banner */
.degradation-banner {
  padding: 10px 14px; border-radius: var(--radius-sm);
  background: var(--warning-bg); border: 1px solid var(--warning);
  margin-bottom: var(--space-3);
  font-size: var(--text-base); display: flex; align-items: center; gap: var(--space-2);
  animation: bannerSlideIn 0.35s var(--ease-out) both;
}
@keyframes bannerSlideIn {
  from { opacity: 0; transform: translateY(-12px); max-height: 0; }
  to { opacity: 1; transform: translateY(0); max-height: 80px; }
}
.degradation-banner .banner-icon { font-size: 15px; flex-shrink: 0; }
.degradation-banner .banner-text { flex: 1; font-weight: 500; }
.degradation-banner .banner-tag {
  padding: 2px 8px; border-radius: var(--radius-full);

// ---- Theme Manager ----
const THEME_KEY = 'spma-theme-pref';

function getEffectiveTheme() {
  const attr = document.documentElement.getAttribute('data-theme-pref');
  if (attr === 'dark') return 'dark';
  if (attr === 'light') return 'light';
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  if (theme === 'dark' || theme === 'light') {
    document.documentElement.setAttribute('data-theme-pref', theme);
    localStorage.setItem(THEME_KEY, theme);
  } else {
    document.documentElement.removeAttribute('data-theme-pref');
    localStorage.removeItem(THEME_KEY);
  }
  updateThemeIcon();
}

function toggleTheme() {
  applyTheme(getEffectiveTheme() === 'dark' ? 'light' : 'dark');
}

function updateThemeIcon() {
  const btn = document.getElementById('btnTheme');
  if (!btn) return;
  btn.textContent = getEffectiveTheme() === 'dark' ? '☀️' : '🌙';
  btn.setAttribute('aria-label', getEffectiveTheme() === 'dark' ? '切换浅色主题' : '切换深色主题');
}

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme-pref', saved);
  }
  updateThemeIcon();
}

// Markdown (light)
function md(t) {
  if (!t) return '';
  let h = esc(t);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^\|(.+)\|$/gm, m => {
    const cells = m.split('|').filter(c => c.trim()).map(c => c.trim());
    if (cells.every(c => /^[-:]+$/.test(c))) return '';
    const tag = h.includes('<th>') ? 'td' : 'th';
    return `<tr>${cells.map(c => `<${tag}>${c}</${tag}>`).join('')}</tr>`;
  });
  h = h.replace(/(<tr>[\s\S]*?<\/tr>)+/g, m => m.includes('<th>') ? `<table><thead>${m.split('</tr>')[0]}</tr></thead><tbody>${m.split('</tr>').slice(1).join('</tr>')}</tbody></table>` : `<table>${m}</table>`);
  h = h.replace(/\[([^\]]+)\]/g, '<span class="citation" data-source="$1">[$1]</span>');
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>)+/g, '<ul>$&</ul>');
  h = h.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br/>');
  h = '<p>' + h + '</p>';
  return h.replace(/<p><\/p>/g, '').replace(/<p><ul>/g, '<ul>').replace(/<\/ul><\/p>/g, '</ul>');
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function newSession() {
  clearSSE(); state.activeSessionId = null; state.queryPhase = 'idle';
  state.detailMode = 'idle'; state.degradationLevel = 0;
  state.highlightedSource = null; state.currentSources = []; state.currentFollowups = [];
  renderChat(); renderSidebar(); renderSystemStatus();
  dom.detailEmpty.style.display = ''; dom.detailContent.style.display = 'none';
  dom.chatInput.focus();
}
function selectSession(id) {
  clearSSE(); state.activeSessionId = id; state.queryPhase = 'done';
  state.degradationLevel = 0; state.highlightedSource = null;
  const s = state.sessions.find(x => x.id === id);
  if (s?.messages.length) {
    const la = [...s.messages].reverse().find(m => m.role==='ai');
    if (la?.sources?.length) {
      state.currentSources = la.sources; state.currentFollowups = la.followups || [];
      state.detailMode = 'sources'; renderDetailSources(la.sources);
    } else { state.detailMode = 'idle'; dom.detailEmpty.style.display=''; dom.detailContent.style.display='none'; }
  }
  renderChat(); renderSidebar(); renderSystemStatus(); dom.chatInput.focus();
}
function deleteSession(id) {
  state.sessions = state.sessions.filter(x => x.id !== id);
  if (state.activeSessionId === id) newSession(); else renderSidebar();
}
function submit(query) {
  if (!query.trim() || ['classifying','retrieving','synthesizing'].includes(state.queryPhase) || state.sqlPending) return;
  if (!state.activeSessionId) {
    const ns = { id:'s'+Date.now(), title:query.slice(0,30)+(query.length>30?'…':''), turns:0, updatedAt:'刚刚', messages:[] };
    state.sessions.unshift(ns); state.activeSessionId = ns.id;
  }
  dom.chatInput.value = ''; dom.chatInput.style.height = 'auto';
  updateSendBtn(); simulateQuery(query);
}
function updateSendBtn() { dom.btnSend.classList.toggle('active', dom.chatInput.value.trim().length > 0); }
function showToast(msg) {
  const t = document.createElement('div'); t.className = 'error-toast';
  t.style.background = 'var(--primary)'; t.style.boxShadow = '0 4px 16px rgba(0,122,255,0.35)';
  t.textContent = msg; dom.toastContainer.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
}

// ---- Events ----
document.addEventListener('click', e => {
  const t = e.target;
  if (t.closest('#btnNewSession')) { newSession(); return; }
  if (t.closest('#btnTheme')) { toggleTheme(); return; }
  const si = t.closest('.session-item');
  if (si && !t.closest('[data-action="delete"]')) { selectSession(si.dataset.sessionId); return; }
  if (t.closest('[data-action="delete"]')) { e.stopPropagation(); if (confirm('确定删除？')) deleteSession(t.closest('[data-action="delete"]').dataset.sessionId); return; }
  if (t.closest('#btnSend')) { submit(dom.chatInput.value); return; }
  if (t.closest('.empty-example')) { submit(t.closest('.empty-example').dataset.query); return; }
  if (t.closest('.followup-pill')) { submit(t.closest('.followup-pill').dataset.followup); return; }
  if (t.closest('[data-action="confirm-sql"]')) { confirmSQL(); return; }
  if (t.closest('[data-action="cancel-sql"]')) { cancelSQL(); return; }
  if (t.closest('[data-action="modify-sql"]')) {
    const card = t.closest('.sql-confirm-card'); const pre = card.querySelector('pre');
    pre.outerHTML = `<textarea class="sql-edit-area">${esc(pre.textContent)}</textarea>`;
    t.closest('.sql-confirm-actions').innerHTML = `<button class="btn-confirm" data-action="confirm-sql">✓ 提交修改</button><button class="btn-cancel-sql" data-action="cancel-sql">✕ 取消</button>`;
    return;
  }
  if (t.closest('[data-action="like"]')) { t.closest('.msg-action').classList.add('liked','bounce'); setTimeout(() => t.closest('.msg-action').classList.remove('bounce'), 400); return; }
  if (t.closest('[data-action="dislike"]')) { const r = prompt('请选择原因：\n1. 不准确\n2. 过时\n3. 不完整\n4. 太慢\n\n或直接输入…'); if (r) showToast('反馈已提交'); return; }
  if (t.closest('[data-action="copy"]')) {
    const idx = parseInt(t.closest('[data-action="copy"]').dataset.msg);
    const s = state.sessions.find(x => x.id === state.activeSessionId);
    if (s) { const ams = s.messages.filter(m => m.role==='ai'); if (ams[idx]) navigator.clipboard.writeText(ams[idx].text||'').then(() => showToast('已复制')); }
    return;
  }
  if (t.closest('.citation')) {
    const sn = t.closest('.citation').dataset.source;
    const idx = state.currentSources.findIndex(s => sn.includes(s.title?.split(' ')[0]) || sn.includes(s.type));
    state.highlightedSource = idx >= 0 ? idx : null;
    if (state.detailMode==='sources' && state.currentSources.length) renderDetailSources(state.currentSources);
    return;
  }
  if (t.closest('.source-option')) {
    $$('.source-option').forEach(o => { o.classList.remove('active'); o.setAttribute('aria-checked','false'); });
    const opt = t.closest('.source-option'); opt.classList.add('active'); opt.setAttribute('aria-checked','true');
    return;
  }
});
document.addEventListener('mouseover', e => {
  if (!e.target.closest('.citation') && state.highlightedSource !== null) {
    state.highlightedSource = null;
    if (state.detailMode==='sources' && state.currentSources.length) renderDetailSources(state.currentSources);
  }
});
document.addEventListener('keydown', e => {
  const mod = navigator.platform.includes('Mac') ? e.metaKey : e.ctrlKey;
  if (mod && e.key === 'k') { e.preventDefault(); newSession(); }
  if (mod && e.key === 'Enter') { e.preventDefault(); submit(dom.chatInput.value); }
  if (mod && e.key === '/') { e.preventDefault(); dom.sourceSelector.querySelector('.source-option')?.focus(); }
  if (e.key === 'Escape' && state.sqlPending) { cancelSQL(); }
});
dom.chatInput.addEventListener('input', () => { updateSendBtn(); dom.chatInput.style.height='auto'; dom.chatInput.style.height=Math.min(dom.chatInput.scrollHeight,120)+'px'; });
$('#sessionSearch').addEventListener('input', e => { dom.sessionList.dataset.search = e.target.value; renderSidebar(); });

// ---- Global debug ----
window.SPMA = { state, newSession, submit, selectSession, showNetworkError, simulateQuery, confirmSQL, cancelSQL, toggleTheme, getEffectiveTheme };
window.showNetworkError = () => {
  const t = document.createElement('div'); t.className = 'error-toast';
  t.innerHTML = '⚠️ 连接中断，正在重连… <button onclick="this.parentElement.remove()">重试</button>';
  dom.toastContainer.appendChild(t);
  setTimeout(() => { if (t.parentElement) t.innerHTML = '❌ 网络不可用 <button onclick="this.parentElement.remove()">重试</button>'; }, 4000);
};

// ---- Init ----
initTheme();
renderSidebar(); renderChat(); renderSystemStatus();
dom.detailEmpty.style.display = ''; dom.detailContent.style.display = 'none';
console.log('%cSPMA QA Prototype — 交付版 %c✓',
  'font-weight:600;font-size:14px;color:var(--primary)',
  'color:var(--success)');
console.log('  🌓 toggleTheme()      深浅色');
console.log('  ⌘K                   新建会话');
console.log('  ⌘Enter               发送');
console.log('  ⚠️  showNetworkError() 模拟断网');
console.log('  🗄️  输入 SQL 查询 → 确认流程');
console.log('  📉 输入"降级" → L2 降级');
</script>
</body>
</html>
