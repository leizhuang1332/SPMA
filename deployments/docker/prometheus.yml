# Prometheus 抓取配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# 告警规则 (来自 config/alerts.yaml)
rule_files:
  - "alerts.yml"

scrape_configs:
  # SPMA API 服务
  - job_name: "spma-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          app: spma
          component: api

  # SPMA Agent 服务
  - job_name: "spma-agent"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent:9000"]
        labels:
          app: spma
          component: agent

  # OTEL Collector 自身 metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          app: spma
          component: otel-collector

  # Prometheus 自身
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
