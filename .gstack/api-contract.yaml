# 错误码完整索引（非 OpenAPI 标准字段，文档性附录）
# ═══════════════════════════════════════════════════════════════

x-error-codes:
  system:
    - code: E0001
      message: 内部服务错误
      http_status: 500
      retryable: true
    - code: E0010
      message: 系统全部不可用（L4降级已触发），请稍后重试
      http_status: 503
      retryable: true
    - code: E0020
      message: 部分功能降级中，结果可能不完整
      http_status: 200
      retryable: false
    - code: E0030
      message: 查询频率过高，请稍后重试
      http_status: 429
      retryable: true

  query_understanding:
    - code: E1001
      message: 查询分类失败，请换一种问法重试
      http_status: 500
      retryable: true
    - code: E1002
      message: 实体识别失败，已使用全文搜索兜底
      http_status: 200
      retryable: false
    - code: E1010
      message: 无法确定查询意图，请提供更多信息
      http_status: 400
      retryable: false
    - code: E1011
      message: 查询过于简短，请补充具体信息
      http_status: 400
      retryable: false

  worker:
    - code: E2001
      message: 文档检索超时，已使用代码和数据库结果
      http_status: 200
      retryable: true
    - code: E2002
      message: 代码检索超时，已使用文档和数据库结果
      http_status: 200
      retryable: true
    - code: E2003
      message: 数据查询超时，已使用文档和代码结果
      http_status: 200
      retryable: true
    - code: E2010
      message: 未找到相关信息，请调整查询条件
      http_status: 200
      retryable: false
    - code: E2020
      message: 部分数据源有结果，已标注缺失维度
      http_status: 200
      retryable: false

  sql_worker:
    - code: E3001
      message: SQL 生成失败，请用更具体的业务描述重试
      http_status: 500
      retryable: true
    - code: E3002
      message: 生成的 SQL 包含不安全的操作，已被拦截
      http_status: 400
      retryable: false
    - code: E3003
      message: SQL 执行失败，请稍后重试
      http_status: 500
      retryable: true
    - code: E3004
      message: SQL 自动修复失败，请手动调整查询条件
      http_status: 500
      retryable: false

  data_source:
    - code: E4001
      message: PRD 文档源暂不可达，已使用其他数据源的结果
      http_status: 200
      retryable: true
    - code: E4002
      message: 代码仓库暂不可达，已使用其他数据源的结果
      http_status: 200
      retryable: true
    - code: E4003
      message: 数据库暂不可达，已使用其他数据源的结果
      http_status: 200
      retryable: true
    - code: E4010
      message: 部分数据可能不是最新，已标注数据新鲜度
      http_status: 200
      retryable: false

  auth:
    - code: E5001
      message: 请先登录
      http_status: 401
      retryable: false
    - code: E5002
      message: 当前用户无权限执行此操作
      http_status: 403
      retryable: false
    - code: E5003
      message: 会话已过期，请重新登录
      http_status: 401
      retryable: false

